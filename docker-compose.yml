services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: caxiasdb
      POSTGRES_PASSWORD: meionorte99
      POSTGRES_DB: caxiasdiary
    ports:
      - '5432:5432'
    volumes:
      - ./data:/var/lib/postgresql/data
    networks:
      - caxiasdiarynetwork

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
    ports:
      - '15432:80'
    depends_on:
      - db
    networks:
      - caxiasdiarynetwork

  sbootapp:
    build:
      dockerfile: Dockerfile
      context: ./backend
    container_name: caxiasdiaryapi
    restart: on-failure
    depends_on:
      - db
    ports:
      - '8080:8080'
    networks:
      - caxiasdiarynetwork
    environment:
      - "POSTGRES_HOST=db"

  reactapp:
    build:
      dockerfile: Dockerfile
      context: ./frontend
    container_name: caxiasdiaryapp
    restart: on-failure
    depends_on:
      - sbootapp
    ports:
      - '3000:3000'
    networks:
      - caxiasdiarynetwork
    expose:
      - 3000

networks:
  caxiasdiarynetwork:
    driver: bridge